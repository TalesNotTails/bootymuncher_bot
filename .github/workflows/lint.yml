name: Lint

on:
  pull_request:
    branches:
      - main  # Change to your default branch if different (e.g., master)

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --config eslint.config.js --max-warnings 0
        # --max-warnings 0 treats any warning as a failure.
        # Remove or increase the value if you want to allow warnings.
